<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
<script src="{{ '/assets/code-copy.js' | relative_url }}" defer></script>
{%- if jekyll.environment == 'production' and site.ga4_measurement_id and site.ga4_measurement_id != "" -%}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga4_measurement_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.ga4_measurement_id }}');
</script>
{%- endif -%}
