# -----------------
- name: shell-guard
  title: "Shell Guard"
  description: "Blocks destructive shell commands (rm -rf, mkfs, dd) before they are executed. Exits with code 1 to abort the tool call."
  tags: [security, safety, shell]
  event: before_shell
  code: |
    event: before_shell
    command: >
      echo "$MINI_A_SHELL_COMMAND" |
      grep -qE '(rm\s+-[a-zA-Z]*r[a-zA-Z]*f|mkfs|dd\s+if=|:\(\)\{|>\s*/dev/sda)' &&
      exit 1 || exit 0
    timeout: 1500
    failBlocks: true

# ---------------------
- name: response-logger
  title: "Response Logger"
  description: "Appends every model response to a session log file. Useful for audit trails and post-session review."
  tags: [logging, audit, debugging]
  event: after_goal
  code: |
    event: after_goal
    command: >
      mkdir -p ~/.openaf-mini-a/logs &&
      echo "--- $(date -Iseconds) ---" >> ~/.openaf-mini-a/logs/session.log &&
      echo "$MINI_A_RESULT" >> ~/.openaf-mini-a/logs/session.log
    timeout: 2000
    failBlocks: false

# ---------------------
- name: pre-goal-banner
  title: "Pre-Goal Banner"
  description: "Prints a formatted banner to the terminal before each goal starts. Helps visually separate runs in long sessions."
  tags: [ux, logging, productivity]
  event: before_goal
  code: |
    event: before_goal
    command: >
      echo "" >> ~/.openaf-mini-a/logs/session.log &&
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >>  ~/.openaf-mini-a/logs/session.log &&
      echo "  mini-a  ▸  $(date '+%H:%M:%S')" >> ~/.openaf-mini-a/logs/session.log &&
      echo "  Goal: $(echo "$MINI_A_GOAL" | head -c 80)"  >> ~/.openaf-mini-a/logs/session.log &&
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"  >> ~/.openaf-mini-a/logs/session.log
    timeout: 1000
    failBlocks: false

# ---------------------
- name: tool-allow-list
  title: "Tool Allow-List"
  description: "Only allows a predefined set of MCP tool names to be called. All other tools are blocked before execution."
  tags: [security, safety, tools]
  event: before_tool
  code: |
    event: before_tool
    # Edit the ALLOWED list to match your permitted tools
    command: >
      ALLOWED="read_file,list_directory,search_files,get_current_time" &&
      echo "$ALLOWED" | tr ',' '\n' | grep -qxF "$MINI_A_TOOL_NAME" ||
      exit 1
    timeout: 500
    failBlocks: true

# ---------------------
- name: kubectl-readonly
  title: "Kubectl Read-Only Guard"
  description: "Blocks mutating `kubectl` shell commands while allowing read-only inspection commands like `get`, `describe`, and `logs`."
  tags: [kubernetes, shell, security, safety]
  event: before_shell
  code: |
    name: kubectl-readonly
    event: before_shell
    failBlocks: true
    injectOutput: false
    timeout: 3000
    command: |
      bash -c '
        cmd="$MINI_A_SHELL_COMMAND"
        if ! echo "$cmd" | grep -qE "(^|[|;&[:space:]])kubectl([[:space:]]|$)"; then
          exit 0
        fi
        subcmd=$(echo "$cmd" | grep -oP "kubectl\s+\K\S+")
        readonly_cmds="get describe logs explain top version api-resources api-versions cluster-info diff"
        for allowed in $readonly_cmds; do
          [ "$subcmd" = "$allowed" ] && exit 0
        done
        echo "BLOCKED: kubectl \"$subcmd\" is not a read-only command" >&2
        exit 1
      '
