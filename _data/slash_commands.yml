- name       : new-hook
  title      : "/new-hook"
  description: "Interactively build a new mini-a hook file and save it to the hooks directory."
  tags       : [meta, hooks, scaffold]
  usage      : "/new-hook"
  code       : |
    ---
    name: new-hook
    description: Interactively build a new mini-a hook file and save it to the hooks directory.
    tags: [meta, hooks, scaffold]
    ---

    Create a new mini-a hook file based on the user's instructions.

    Hooks are YAML files that run shell commands at specific lifecycle events. They live in the `hooks/` directory and are activated when the file has a `.yaml` extension (disabled when renamed to `.yaml.disabled`).

    ## Step 1 — Gather hook details

    Use the `userInput` tool to collect the required information. Ask for:

    1. **Hook name** — a short kebab-case identifier (e.g. `cost-tracker`, `log-shell`).
    2. **Event** — one of: `before_goal`, `after_goal`, `before_shell`, `after_shell`, `before_tool`, `after_tool`.
    3. **Command** — the shell command(s) to run.
    4. **Inject output?** *(optional, default: false)* — if `true`, stdout is injected into the agent's context.
    5. **Timeout** *(optional)* — max run time in milliseconds.
    6. **Fail blocks?** *(optional, default: true)* — set `false` for logging/observability hooks.
    7. **Start enabled or disabled?** — `.yaml` (enabled) or `.yaml.disabled` (disabled).

    ## Step 2 — Draft the hook file

    Compose the hook YAML:

    ```yaml
    event: <event>
    command: |
      <shell command(s)>
    # injectOutput: true      ← include only if true
    # timeout: 2000           ← include only if provided
    # failBlocks: false       ← include only if false
    ```

    ## Step 3 — Preview and confirm

    Display the full generated file content and ask the user to choose: **save**, **edit**, or **cancel**.

    ## Step 4 — Write the file

    Write to `<name>.yaml` or `<name>.yaml.disabled` in the `hooks/` directory. Confirm the path.

