# ------------
- name: review
  title: "/review"
  description: "Trigger a code review on a file or directory. Passes the target path and any flags directly to the model."
  tags: [code, review, git]
  usage: "/review src/api.js --security"
  code: |
    Review target: {{arg1}}
    Flags: {{args}}

    Perform a thorough code review of {{arg1}}.
    Focus on: correctness, security, performance, and readability.
    Categorize findings as critical, warning, or suggestion.
    Cite file and line numbers for every finding.

# ------------
- name: commit
  title: "/commit"
  description: "Generates a conventional commit message for the current staged changes. Optionally accepts a scope."
  tags: [git, commit, conventional-commits]
  usage: "/commit auth"
  code: |
    Scope (optional): {{arg1}}

    Inspect the current staged git diff and write a conventional commit message.
    Format: <type>(<scope>): <short summary>

    Types: feat, fix, chore, docs, refactor, test, perf, ci, build.
    Keep the subject line under 72 characters.
    Add a body paragraph if the change is non-trivial.

# -------------
- name: explain
  title: "/explain"
  description: "Explains a file, function, or code snippet in plain language. Great for onboarding or understanding unfamiliar code."
  tags: [code, docs, learning]
  usage: "/explain src/utils/tokenizer.js"
  code: |
    Target: {{arg1}}

    Explain {{arg1}} in plain language suitable for a developer unfamiliar
    with this codebase. Cover:
    1. Purpose and responsibility
    2. Inputs and outputs
    3. Key algorithms or patterns used
    4. Any gotchas or non-obvious behaviour

