- name: translate
  title: "/translate"
  description: "Translates code from one language or format to another (e.g., JS → TS, JSON → YAML, Python 2 → 3)."
  tags: [code, refactor, migration]
  usage: "/translate config.json yaml"
  code: |
    Source: {{arg1}}
    Target format: {{arg2}}

    Translate {{arg1}} to {{arg2}}.
    Preserve all semantics exactly. Add comments where the translation
    requires non-obvious choices or where idioms differ between formats.

