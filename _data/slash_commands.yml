- name       : new-agent
  title      : "/new-agent"
  description: "Interactively build a new mini-a agent file and save it, following the standard agent template format."
  tags       : [meta, agents, scaffold]
  usage      : "/new-agent"
  code       : |
    ---
    name: new-agent
    description: Interactively build a new mini-a agent file and save it, following the standard agent template format.
    tags: [meta, agents, scaffold]
    ---

    Create a new mini-a agent file based on the user's instructions.

    Agent files are Markdown files with a YAML front-matter block that configures identity, model, capabilities, MCP tools, constraints, knowledge, and persona.

    ## Step 1 — Gather agent details

    Use the `userInput` tool to collect the required information. Ask for:

    1. **Name** — a short kebab-case identifier (e.g. `code-reviewer`, `daily-standup`).
    2. **Description** — one sentence explaining what the agent does.
    3. **Default goal** — the task the agent performs when invoked without an explicit `goal=`.
    4. **Capabilities** — which to enable (default: `useutils` + `usetools`): `useshell`, `readwrite`.
    5. **MCP tools** *(optional)* — MCP connections to expose (`ojob`, `sse`, `remote`, `stdio`).
    6. **Constraints** *(optional)* — behavioural rules appended to the system prompt.
    7. **Knowledge** *(optional)* — domain-specific background text injected at session start.
    8. **Persona / youare** *(optional)* — replaces the default "You are a helpful assistant" opener.
    9. **Model** *(optional)* — override `OAF_MODEL` for this agent.

    ## Step 2 — Draft the agent file

    ```
    ---
    name        : <name>
    description : <description>
    capabilities:
      - useutils
      - usetools
    tools:
      - type   : ojob
        options:
          job  : mcps/mcp-time.yaml
    constraints:
      - Prefer tool-grounded answers over assumptions.
      - Be explicit when information is missing or uncertain.
    ---

    <default goal>
    ```

    ## Step 3 — Preview and confirm

    Display the full generated file content and ask the user to choose: **save**, **edit**, or **cancel**.

    ## Step 4 — Write the file

    Write `<name>.md` to the output path. Confirm with the full path and remind the user:

    ```
    mini-a agent=<filename>
    mini-a agent=<filename> goal="override goal here"
    ```

