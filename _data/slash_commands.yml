- name       : new-skill
  title      : "/new-skill"
  description: "Interactively build a new mini-a skill and save it to the skills directory."
  tags       : [meta, skills, scaffold]
  usage      : "/new-skill"
  code       : |
    ---
    name: new-skill
    description: Interactively build a new mini-a skill and save it to the skills directory.
    tags: [meta, skills, scaffold]
    ---

    Create a new mini-a skill based on the user's instructions.

    Skills are reusable specialist prompts stored as `skills/<name>/SKILL.md`. When loaded, the skill's body replaces or extends the agent's system prompt, turning it into a focused expert.

    ## Step 1 — Gather skill details

    Use the `userInput` tool to collect the required information. Ask for:

    1. **Skill name** — a short kebab-case identifier (e.g. `code-reviewer`, `sql-expert`).
    2. **Version** — initial version string (default: `1.0.0`).
    3. **Description** — 1–5 sentences describing what the skill does and when to use it.
    4. **Allowed tools** *(optional)* — comma-separated list (e.g. `Read, Write, Bash`). Leave blank to allow all.
    5. **Skill instructions** — what the agent should do, rules, examples, output format.

    ## Step 2 — Draft the skill file

    Compose `SKILL.md`:

    ```
    ---
    name: <name>
    version: <version>
    description: |
      <description>
    allowed-tools:
      - Read
      # ... (omit section if no restriction)
    ---

    # <Skill Title>

    ## Your Task

    ## Process

    1. <Step 1>
    ...

    ## Output Format
    ```

    ## Step 3 — Preview and confirm

    Display the full generated file content and ask the user to choose: **save**, **edit**, or **cancel**.

    ## Step 4 — Write the file

    Create `skills/<name>/SKILL.md`. Confirm with the full path and remind the user:

    ```
    mini-a skill=<name> goal="your task here"
    ```

